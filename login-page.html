<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9eadf;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-container h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      font-size: 16px;
      color: #333;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    .form-group input[type="submit"] {
      background-color: #ffb6c1;
      color: black;
      border: none;
      cursor: pointer;
    }
    .form-group input[type="submit"]:hover {
      background-color: #e89aa7;
    }
    .form-group input[type="reset"] {
      background-color: #777;
      color: white;
      border: none;
      cursor: pointer;
    }
    .form-group input[type="reset"]:hover {
      background-color: #555;
    }
    .signup-link {
      margin-top: 10px;
    }
    .signup-link a {
      color: #007bff;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>Welcome</h1>
    <form action="Login-page.html" method="POST">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="mot_pass">Password:</label>
        <input type="password" id="mot_pass" name="mot_pass" placeholder="Enter your password">
      </div>

      <div class="form-group">
        <input type="submit" value="log in">
        <input type="reset" value="Reset">
      </div>

      <div class="signup-link">
        <p>Don't have an account? <a href="inscription.html">Sign up</a></p>
      </div>
    </form>
  </div>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.querySelector("form");

  form.addEventListener("submit", function (e) {
   

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("mot_pass").value.trim();

    if (email === "" || password === "") {
      alert(" Please fill all fields");
      return;
    }
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!emailPattern.test(email)) {
      alert(" Invalid email format");
      return;
    }
    if (password.length < 4) {
      alert(" Password must be at least 4 characters");
      return;
    }

    alert(" Login successful");
    form.submit();

  });

});
</script>
</body>
</html>
